<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-title" content="香水收藏室" />
<meta name="theme-color" content="#F3EFE5" />
<link rel="manifest" href="manifest.webmanifest" />
<link rel="icon" type="image/svg+xml" href="icon.svg" />
<link rel="apple-touch-icon" href="icon.svg" />
<title>香水收藏室 · The Perfume Cabinet</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Noto+Serif+TC:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #EAE5D8;
    --text: #332D26; --text-strong: #26211B; --text-soft: #443E36; --text-chip: #4E473F;
    --text-count: #5A534A; --text-desc: #665F55;
    --muted: #756D62; --muted-2: #82796D; --muted-3: #8A8177; --muted-4: #9C9388;
    --gold-text: #9A7830; --gold-text-2: #96742E; --gold-label: #A2803C;
    --rose: #AD5B69; --sage: #5F7E4C; --danger: #A9505E; --err: #A34A56;
    --glass: rgba(255,255,255,0.42); --glass-2: rgba(255,255,255,0.36); --glass-3: rgba(255,255,255,0.5);
    --border: rgba(62,52,38,0.14); --border-2: rgba(62,52,38,0.12); --border-3: rgba(62,52,38,0.18);
    --border-soft: rgba(62,52,38,0.08); --border-faint: rgba(62,52,38,0.06); --border-hover: rgba(62,52,38,0.3);
    --sh-a: rgba(96,78,52,0.1); --sh-b: rgba(96,78,52,0.12); --sh-c: rgba(96,78,52,0.16); --sh-d: rgba(96,78,52,0.2);
    --overlay: rgba(60,48,34,0.32);
    --modal-bg: linear-gradient(180deg, rgba(255,255,255,0.9), rgba(246,241,231,0.94));
    --option-bg: #F5F0E5;
    --img-bg: rgba(62,52,38,0.06);
    --iconbtn-bg: rgba(255,255,255,0.8);
    --inset-hi: rgba(255,255,255,0.65);
  }
  body.dark {
    --bg: #0E0C0D;
    --text: #EDE9E3; --text-strong: #F2ECDF; --text-soft: #D8D2C8; --text-chip: #CFC9C0;
    --text-count: #BDB6AC; --text-desc: #ABA49A;
    --muted: #9A938A; --muted-2: #8D867D; --muted-3: #7A736B; --muted-4: #6B645C;
    --gold-text: #E0C078; --gold-text-2: #D9BE74; --gold-label: #C9A85C;
    --rose: #D08C97; --sage: #9FB58C; --danger: #C97D86; --err: #E2A0A8;
    --glass: rgba(255,253,248,0.045); --glass-2: rgba(255,253,248,0.04); --glass-3: rgba(255,253,248,0.05);
    --border: rgba(255,250,240,0.1); --border-2: rgba(255,250,240,0.09); --border-3: rgba(255,250,240,0.12);
    --border-soft: rgba(255,250,240,0.08); --border-faint: rgba(255,250,240,0.06); --border-hover: rgba(255,250,240,0.2);
    --sh-a: rgba(0,0,0,0.35); --sh-b: rgba(0,0,0,0.4); --sh-c: rgba(0,0,0,0.5); --sh-d: rgba(0,0,0,0.6);
    --overlay: rgba(8,6,7,0.6);
    --modal-bg: linear-gradient(180deg, rgba(38,33,37,0.92), rgba(22,19,21,0.94));
    --option-bg: #1E1A1D;
    --img-bg: rgba(12,10,11,0.5);
    --iconbtn-bg: rgba(20,17,19,0.85);
    --inset-hi: rgba(255,255,255,0.03);
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Serif TC', 'Cormorant Garamond', Georgia, 'Songti TC', 'SimSun', serif;
    font-weight: 500;
    -webkit-font-smoothing: antialiased;
  }
  /* 墨流背景層（固定，內容在其上滑動） */
  .ink-bg {
    position: fixed; inset: 0; z-index: 0; pointer-events: none;
    background:
      radial-gradient(1100px 600px at 18% -8%, var(--inset-hi) 0%, transparent 60%),
      radial-gradient(900px 700px at 88% 22%, rgba(214,206,192,0.5) 0%, transparent 62%),
      radial-gradient(1300px 800px at 50% 118%, rgba(226,219,205,0.65) 0%, transparent 66%),
      #F3EFE5;
  }
  .ink-bg svg { position: absolute; inset: 0; width: 100%; height: 100%; z-index: 1; }
  .wrap { position: relative; z-index: 1; }
  input, select, button, textarea { font-family: inherit; }
  .spin { animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .wrap { padding: 40px 20px 80px; min-height: 100vh; }
  .narrow { max-width: 720px; margin: 0 auto; }
  .wide { max-width: 960px; margin: 0 auto; }
  .serif { font-family: 'Cormorant Garamond', 'Noto Serif TC', Georgia, serif; }

  .kicker { font-size: 10.5px; letter-spacing: 4.5px; text-transform: uppercase; color: var(--gold-label); }
  h1.title { font-family: 'Cormorant Garamond', 'Noto Serif TC', Georgia, serif; font-size: 50px; font-weight: 500; margin: 0 0 10px; line-height: 1.02; letter-spacing: 0.2px; color: var(--text-strong); }
  h1.title em { font-style: italic; font-weight: 400; color: var(--gold-text); }
  .gold-rule { display: flex; align-items: center; gap: 12px; margin: 18px 0 0; }
  .gold-rule::before, .gold-rule::after { content: ""; flex: 1; height: 1px; background: linear-gradient(90deg, transparent, rgba(201,168,92,0.45), transparent); }
  .gold-rule span { color: #C9A85C; font-size: 11px; letter-spacing: 2px; }
  .subtitle { font-size: 14px; font-weight: 500; color: var(--muted); margin: 0; max-width: 460px; }

  .btn-add { font-weight: 700; border: 1px solid rgba(224,192,120,0.7); background: linear-gradient(180deg, #E2C77E 0%, #C79E4F 55%, #B58C3E 100%); color: #221A0C; font-size: 14px; font-weight: 600; letter-spacing: 0.3px; padding: 12px 22px; border-radius: 12px; cursor: pointer; display: inline-flex; align-items: center; gap: 7px; box-shadow: 0 6px 22px rgba(201,168,92,0.22), inset 0 1px 0 rgba(255,244,214,0.55); transition: transform .18s, box-shadow .18s; }
  .btn-add:hover { transform: translateY(-1px); box-shadow: 0 10px 28px rgba(201,168,92,0.3), inset 0 1px 0 rgba(255,244,214,0.55); }

  .panel { background: var(--glass); border: 1px solid var(--border); border-top-color: rgba(224,192,120,0.3); border-radius: 20px; padding: 22px; box-shadow: 0 18px 60px var(--sh-c), inset 0 1px 0 var(--border-soft); backdrop-filter: blur(18px) saturate(1.15); -webkit-backdrop-filter: blur(18px) saturate(1.15); margin-top: 18px; }
  .w-title { font-family: 'Cormorant Garamond', 'Noto Serif TC', Georgia, serif; font-size: 22px; font-weight: 700; color: var(--text-strong); }
  .w-sub { font-size: 13px; color: var(--muted); margin-top: 2px; margin-bottom: 14px; }
  .w-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 9px; }
  .chip { display: flex; flex-direction: column; align-items: center; gap: 2px; padding: 12px 8px; border: 1px solid var(--border); border-radius: 12px; background: var(--glass); cursor: pointer; transition: border-color .15s, background .15s; }
  .chip:hover { border-color: var(--border-hover); }
  .chip.active { border-color: #C9A85C; background: rgba(201,168,92,0.12); box-shadow: 0 0 0 1px #C9A85C; }
  .chip .emoji { font-size: 22px; line-height: 1; }
  .chip .c-label { font-size: 13px; font-weight: 600; color: var(--text); margin-top: 3px; }
  .chip .c-sub { font-size: 10px; color: var(--muted-2); }
  .hint { font-size: 13px; color: var(--muted-2); margin-top: 14px; display: flex; align-items: center; gap: 6px; }
  .wx-err { font-size: 12.5px; color: var(--text-count); background: var(--border-faint); border: 1px solid var(--border); border-radius: 10px; padding: 10px 12px; margin-bottom: 12px; line-height: 1.5; }
  .retry { display: block; margin-top: 8px; border: 1px solid #C9A85C; background: transparent; color: var(--gold-text-2); font-size: 12px; font-weight: 600; padding: 6px 12px; border-radius: 8px; cursor: pointer; }
  .loc-btn { margin-bottom: 14px; border: 1px solid var(--border); background: var(--glass-3); color: var(--gold-text-2); font-size: 13px; font-weight: 600; padding: 9px 14px; border-radius: 10px; cursor: pointer; }
  .loc-btn:hover { border-color: #C9A85C; }

  .rec-card { display: flex; gap: 16px; margin-top: 18px; padding-top: 16px; border-top: 1px solid var(--border-2); }
  .rec-img { width: 84px; height: 104px; flex-shrink: 0; border-radius: 10px; overflow: hidden; background: var(--border-faint); border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; }
  .rec-tag { display: inline-flex; align-items: center; gap: 4px; font-size: 10px; letter-spacing: 1.5px; text-transform: uppercase; color: var(--gold-label); font-weight: 600; }
  .rec-name { font-family: 'Cormorant Garamond', 'Noto Serif TC', Georgia, serif; font-size: 23px; font-weight: 600; line-height: 1.1; margin-top: 3px; color: var(--text-strong); }
  .rec-orig { font-size: 12px; font-style: italic; color: var(--muted); margin-top: 1px; }
  .rec-reason { font-size: 13px; color: var(--text-chip); line-height: 1.6; margin: 8px 0 0; }

  .rec-list { margin-top: 18px; padding-top: 16px; border-top: 1px solid var(--border-2); }
  .rec-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
  .rec-count { font-size: 11px; color: var(--text-count); background: var(--border-2); border-radius: 999px; padding: 2px 9px; }
  .rec-row { display: flex; gap: 12px; align-items: flex-start; padding: 11px 0; border-bottom: 1px solid var(--border-soft); }
  .rec-row:last-child { border-bottom: none; }
  .rl-rank { flex-shrink: 0; width: 24px; height: 24px; border-radius: 999px; background: rgba(201,168,92,0.14); border: 1px solid rgba(201,168,92,0.4); color: var(--gold-text-2); font-size: 12px; font-weight: 600; display: flex; align-items: center; justify-content: center; margin-top: 1px; }
  .rl-body { flex: 1; min-width: 0; }
  .rl-title { font-family: 'Cormorant Garamond', 'Noto Serif TC', Georgia, serif; font-size: 19px; font-weight: 700; line-height: 1.15; color: var(--text-strong); }
  .rl-orig { font-family: 'Noto Serif TC', serif; font-size: 12px; font-style: italic; color: var(--muted-2); font-weight: 400; }
  .rl-brand { font-size: 10px; letter-spacing: 1.2px; text-transform: uppercase; color: var(--muted-2); margin-top: 2px; }
  .rec-hits { margin-top: 6px; font-size: 11px; color: var(--muted); display: flex; flex-wrap: wrap; gap: 4px; align-items: center; }
  .hit-pill { font-size: 11px; padding: 1px 8px; border-radius: 999px; background: rgba(201,168,92,0.12); border: 1px solid rgba(201,168,92,0.3); color: var(--gold-text-2); }
  .rl-side { flex-shrink: 0; }

  .col-head { margin: 44px auto 16px; display: flex; align-items: baseline; gap: 10px; padding-top: 24px; border-top: 1px solid var(--border-2); cursor: pointer; }
  .col-arrow { margin-left: auto; font-size: 12px; font-weight: 600; color: var(--gold-text-2); align-self: center; }
  .col-title { font-family: 'Cormorant Garamond', 'Noto Serif TC', Georgia, serif; font-size: 24px; font-weight: 700; color: var(--text-strong); }
  .count { font-size: 12px; color: var(--text-count); background: var(--border-2); border-radius: 999px; padding: 2px 9px; }
  .empty { text-align: center; color: var(--muted-2); font-size: 14px; padding: 40px 0; }

  .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; }
  .card { position: relative; background: var(--glass-2); border: 1px solid var(--border-2); border-top-color: rgba(224,192,120,0.22); border-radius: 16px; padding: 12px; box-shadow: 0 10px 36px var(--sh-b); backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px); transition: transform .18s, box-shadow .18s, border-color .18s; }
  .card:hover { transform: translateY(-2px); border-color: rgba(224,192,120,0.35); box-shadow: 0 16px 46px var(--sh-c); }
  .card-actions { position: absolute; top: 9px; right: 9px; display: flex; gap: 5px; z-index: 2; }
  .icon-btn { border: 1px solid var(--border); background: var(--iconbtn-bg); border-radius: 8px; padding: 6px; cursor: pointer; color: var(--muted); box-shadow: 0 1px 3px var(--sh-a); display: inline-flex; }
  .icon-btn.danger { color: var(--danger); }
  .card-img { width: 100%; height: 72px; border-radius: 10px; overflow: hidden; background: var(--border-faint); border: 1px solid var(--border); margin-bottom: 9px; display: flex; align-items: center; justify-content: center; }
  .c-brand { font-size: 9px; letter-spacing: 1px; text-transform: uppercase; color: var(--muted-2); }
  .c-name { font-family: 'Cormorant Garamond', 'Noto Serif TC', Georgia, serif; font-size: 17px; font-weight: 700; line-height: 1.1; margin-top: 2px; color: var(--text-strong); }
  .c-orig { font-size: 10.5px; font-style: italic; color: var(--muted); margin-top: 1px; }
  .c-desc { font-size: 11px; font-weight: 500; color: var(--text-desc); margin: 6px 0 0; line-height: 1.45; }

  .pyramid { margin-top: 10px; display: flex; flex-direction: column; gap: 7px; }
  .tier-row { display: flex; gap: 10px; align-items: flex-start; }
  .tier-head { display: flex; flex-direction: column; align-items: flex-start; min-width: 40px; flex-shrink: 0; }
  .tier-label { font-family: 'Cormorant Garamond', 'Noto Serif TC', Georgia, serif; font-size: 15px; line-height: 1; font-weight: 600; }
  .tier-sub { font-size: 9px; letter-spacing: 1px; color: var(--muted-2); text-transform: uppercase; margin-top: 2px; }
  .note-pills { display: flex; flex-wrap: wrap; gap: 5px; }
  .pill { font-size: 11px; padding: 2px 9px; border-radius: 999px; color: var(--text-soft); }

  .overlay { position: fixed; inset: 0; background: var(--overlay); display: flex; align-items: flex-start; justify-content: center; padding: 40px 16px; overflow-y: auto; z-index: 50; backdrop-filter: blur(2px); }
  .modal { position: relative; width: 100%; max-width: 520px; background: var(--modal-bg); border: 1px solid var(--border-3); border-top-color: rgba(201,168,92,0.35); border-radius: 20px; padding: 26px; box-shadow: 0 24px 70px var(--sh-d); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); }
  .close { position: absolute; top: 16px; right: 16px; border: none; background: transparent; cursor: pointer; color: var(--muted-2); padding: 4px; display: inline-flex; }
  .modal-title { font-family: 'Cormorant Garamond', 'Noto Serif TC', Georgia, serif; font-size: 28px; font-weight: 700; margin-bottom: 18px; color: var(--text-strong); }
  .f-row { display: flex; gap: 12px; }
  .field { flex: 1; margin-bottom: 12px; }
  .f-label { font-size: 11px; letter-spacing: 0.5px; color: var(--muted-2); margin-bottom: 5px; font-weight: 500; }
  .input { width: 100%; border: 1px solid var(--border); border-radius: 9px; padding: 9px 12px; font-size: 14px; color: var(--text); background: var(--glass-3); outline: none; }
  .input:focus { border-color: #C9A85C; }
  .input::placeholder { color: var(--muted-4); }
  select.input option { background: var(--option-bg); color: var(--text); }
  .f-err { font-size: 13px; color: var(--err); background: rgba(201,125,134,0.12); border: 1px solid rgba(201,125,134,0.3); border-radius: 9px; padding: 9px 12px; margin-top: 4px; margin-bottom: 12px; }
  .save-btn { font-weight: 700; margin-top: 14px; width: 100%; border: 1px solid rgba(224,192,120,0.7); background: linear-gradient(180deg, #E2C77E 0%, #C79E4F 55%, #B58C3E 100%); color: #221A0C; font-size: 14px; font-weight: 600; letter-spacing: 0.3px; padding: 12px; border-radius: 11px; cursor: pointer; box-shadow: 0 6px 22px rgba(201,168,92,0.2), inset 0 1px 0 rgba(255,244,214,0.55); transition: transform .18s, box-shadow .18s; }
  .save-btn:hover { transform: translateY(-1px); box-shadow: 0 10px 28px rgba(201,168,92,0.28), inset 0 1px 0 rgba(255,244,214,0.55); }

  @media (max-width: 900px) { .grid { grid-template-columns: repeat(2, 1fr); } }
  @media (max-width: 540px) { .grid { gap: 10px; } .card { padding: 10px; } .c-name { font-size: 15px; } .card-img { height: 60px; } }

  /* 手機效能優化：即時毛玻璃在手機 GPU 上太重，改用純半透明底（視覺近似，大幅省效能） */
  @media (hover: none), (max-width: 900px) {
    .card, .panel, .fchip, .tab-btn, .input, .theme-toggle, .modal, .tarot-card.back, .icon-btn {
      backdrop-filter: none !important;
      -webkit-backdrop-filter: none !important;
    }
    /* 卡片與面板略為加不透明，補回失去模糊後的可讀性 */
    body:not(.dark) .card, body:not(.dark) .panel { background: rgba(250,247,240,0.92); }
    body.dark .card, body.dark .panel { background: rgba(26,23,25,0.9); }
    body:not(.dark) .fchip, body:not(.dark) .tab-btn, body:not(.dark) .input { background: rgba(250,247,240,0.8); }
    body.dark .fchip, body.dark .tab-btn, body.dark .input { background: rgba(30,26,29,0.78); }
    /* 動畫用 GPU 合成，避免手機掉格 */
    .tarot-card.back, .tarot-result .tarot-card.front { will-change: transform; transform: translateZ(0); }
    .card { will-change: auto; }
  }
  .card .pill { font-size: 10px; padding: 1px 7px; }
  .card .tier-label { font-size: 13px; }
  .card .pyramid { gap: 5px; margin-top: 8px; }

  .tab-nav { display: flex; gap: 8px; margin-top: 18px; }
  .tab-btn { flex: 1; border: 1px solid var(--border-2); background: var(--glass-2); color: var(--muted); font-size: 14px; font-weight: 600; letter-spacing: 0.3px; padding: 13px; border-radius: 12px; cursor: pointer; transition: all .18s; }
  .tab-btn:hover { border-color: rgba(201,168,92,0.4); color: var(--text-chip); }
  .tab-btn.on { border-color: rgba(201,168,92,0.65); background: linear-gradient(180deg, rgba(201,168,92,0.16), rgba(201,168,92,0.08)); color: var(--gold-text); box-shadow: inset 0 1px 0 rgba(255,244,214,0.12); }

  .tarot-stage { display: flex; justify-content: center; padding: 24px 0 8px; perspective: 900px; }
  .tarot-card.back { transform-style: preserve-3d; transition: transform .28s ease-in, box-shadow .2s; will-change: transform; }
  .tarot-card.back.flipping { transform: rotateY(90deg); }
  .tarot-result .tarot-card.front { animation: flipIn .32s ease-out; backface-visibility: hidden; }
  @keyframes flipIn { from { transform: rotateY(-90deg); opacity: .5; } to { transform: rotateY(0deg); opacity: 1; } }
  .tarot-card { border-radius: 16px; }
  .tarot-card.back { width: 180px; height: 280px; background: linear-gradient(160deg, rgba(48,42,46,0.75) 0%, rgba(18,15,17,0.85) 100%); border: 1px solid rgba(201,168,92,0.45); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 14px; cursor: pointer; box-shadow: 0 14px 48px var(--sh-c), inset 0 0 0 6px rgba(201,168,92,0.1), inset 0 0 60px rgba(201,168,92,0.05); transition: transform .2s, box-shadow .2s; }
  .tarot-card.back:hover { transform: translateY(-5px); box-shadow: 0 20px 60px var(--sh-d), inset 0 0 0 6px rgba(201,168,92,0.2), inset 0 0 60px rgba(201,168,92,0.08); }
  .tarot-back-emblem { font-size: 44px; color: #C9A85C; text-shadow: 0 0 18px rgba(201,168,92,0.5); }
  .tarot-back-text { font-size: 12px; letter-spacing: 2px; color: #B8B0A4; }
  .tarot-result { animation: fadeUp .4s ease; }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }
  .tarot-card.front { padding: 22px; background: linear-gradient(160deg, rgba(201,168,92,0.10), var(--glass)); border: 1px solid #C9A85C66; text-align: center; }
  .tarot-elem { display: inline-block; width: 34px; height: 34px; line-height: 34px; border-radius: 999px; border: 1px solid #C9A85C; color: var(--gold-text); font-size: 16px; font-weight: 600; margin-bottom: 8px; }
  .tarot-name { font-family: 'Cormorant Garamond', 'Noto Serif TC', Georgia, serif; font-size: 26px; font-weight: 700; color: var(--text-strong); line-height: 1.1; }
  .tarot-up { font-size: 12px; color: var(--muted); margin-top: 4px; }
  .tarot-oracle { font-size: 14px; color: var(--gold-text-2); line-height: 1.7; margin-top: 14px; font-style: italic; }
  .tarot-perfume { margin-top: 18px; padding-top: 16px; border-top: 1px solid var(--border-2); }
  .tarot-src { font-size: 11px; color: var(--muted-4); margin-top: 10px; }
  .orient { display: inline-block; margin: 0 0 8px 8px; font-size: 11px; font-weight: 600; letter-spacing: 1px; padding: 2px 10px; border-radius: 999px; vertical-align: middle; }
  .orient.up { color: var(--sage); background: rgba(159,181,140,0.14); border: 1px solid rgba(159,181,140,0.35); }
  .orient.rev { color: var(--rose); background: rgba(208,140,151,0.14); border: 1px solid rgba(208,140,151,0.35); }

// ── 持久儲存：IndexedDB ──────────────────────────────
const DB_NAME = "perfume-cabinet", STORE = "perfumes";
function openDB() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open(DB_NAME, 1);
    req.onupgradeneeded = () => { const db = req.result; if (!db.objectStoreNames.contains(STORE)) db.createObjectStore(STORE, { keyPath: "id" }); };
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });
}
const store = {
  async all() { const db = await openDB(); return new Promise((res, rej) => { const t = db.transaction(STORE,"readonly").objectStore(STORE).getAll(); t.onsuccess=()=>res(t.result||[]); t.onerror=()=>rej(t.error); }); },
  async put(item) { const db = await openDB(); return new Promise((res, rej) => { const t = db.transaction(STORE,"readwrite").objectStore(STORE).put(item); t.onsuccess=()=>res(true); t.onerror=()=>rej(t.error); }); },
  async del(id) { const db = await openDB(); return new Promise((res, rej) => { const t = db.transaction(STORE,"readwrite").objectStore(STORE).delete(id); t.onsuccess=()=>res(true); t.onerror=()=>rej(t.error); }); },
};

// 取一款香水的全部香調字串
function allNotesOf(p) {
  return [].concat(p.notes && p.notes.top || [], p.notes && p.notes.middle || [], p.notes && p.notes.base || []).join(" ");
}

// 今日日期字串（當地時區），用來判斷「同一天固定」
function todayKey() {
  const d = new Date();
  return d.getFullYear() + "-" + (d.getMonth()+1) + "-" + d.getDate();
}
// 以字串為種子的簡單亂數（讓同一天、同一張牌挑到同一款香水）
function seededPick(arr, seedStr) {
  if (!arr.length) return null;
  let h = 0;
  for (let i = 0; i < seedStr.length; i++) { h = (h * 31 + seedStr.charCodeAt(i)) >>> 0; }
  return arr[h % arr.length];
}
// 依牌的元素，從收藏挑一款搭的香水（在所有命中的款中加權隨機，避免每次都同一款）
function perfumeForElement(element, seedStr) {
  if (!ST.collection.length) return null;
  const el = TAROT_ELEMENTS[element] || TAROT_ELEMENTS.aether;
  const scored = ST.collection.map((p) => {
    const all = allNotesOf(p);
    let s = 0; el.like.forEach((kw) => { if (all.indexOf(kw) >= 0) s++; });
    return { p, s };
  });
  // 命中（score>0）的候選池：依命中數加權，命中越多被選中機率越高，但不鎖死最高分那款
  const pool = [];
  scored.forEach((x) => { if (x.s > 0) { for (let i = 0; i < x.s; i++) pool.push(x.p); } });
  if (pool.length) return seededPick(pool, seedStr);
  // 完全沒命中 → 從全部收藏挑
  return seededPick(ST.collection, seedStr);
}

async function drawTarot(force) {
  // 同一天已抽過就直接用（除非 force 重抽）
  const saved = ST.tarotSaved;
  const tk = todayKey();
  if (!force && saved && saved.day === tk) {
    ST.tarot = { card: saved.card, reversed: saved.reversed, fortune: saved.fortune, perfume: ST.collection.find((c) => c.id === saved.perfumeId) || perfumeForElement(saved.card.element, saved.card.name + tk), oracle: saved.oracle, flipped: false };
    render();
    return;
  }
  ST.tarotLoading = true; render();
  let card = null;
  // 先試 tarotapi.dev（連網）
  try {
    const r = await fetch("https://tarotapi.dev/api/v1/cards/random?n=1");
    const j = await r.json();
    const c = j && j.cards && j.cards[0];
    if (c) {
      const elemGuess = guessElement(c);
      card = {
        name: c.name,
        nameZh: TAROT_NAME_ZH[c.name] || c.name,
        upright: c.meaning_up ? c.meaning_up.split(/[,.;]/).slice(0,2).join("、").trim() : "",
        reversed: c.meaning_rev ? c.meaning_rev.split(/[,.;]/).slice(0,2).join("、").trim() : "",
        element: elemGuess,
        source: "api",
      };
    }
  } catch (e) { /* 連不上 → 用內建 */ }
  // 每次抽牌產生一個隨機 nonce，讓這次抽牌真正隨機（同日已抽過會走前面 saved 分支固定）
  const nonce = Math.random().toString(36).slice(2) + Date.now();
  // 備援：內建牌庫
  if (!card) {
    const fb = seededPick(TAROT_FALLBACK, nonce) || TAROT_FALLBACK[0];
    card = { name: fb.name, nameZh: fb.nameZh, upright: fb.upright, reversed: fb.reversed, element: fb.element, source: "fallback" };
  }
  const orient = seededPick([false, false, true, true], card.name + nonce);
  const reversed = !!orient;
  const seedStr = card.name + nonce;
  const perfume = perfumeForElement(card.element, seedStr);
  const oracle = (TAROT_ELEMENTS[card.element] || TAROT_ELEMENTS.aether).oracle;
  const fortune = fortuneText(card, reversed);
  ST.tarot = { card, reversed, fortune, perfume, oracle, flipped: false };
  ST.tarotLoading = false;
  // 存今日結果
  ST.tarotSaved = { day: tk, card, reversed, fortune, perfumeId: perfume ? perfume.id : null, oracle };
  try { await store.put({ id: "tarot_today", _marker: true, value: ST.tarotSaved }); } catch (e) {}
  render();
}

// 由 API 牌面推測元素
function guessElement(c) {
  const suit = (c.suit || "").toLowerCase();
  if (suit.indexOf("wand") >= 0) return "fire";
  if (suit.indexOf("cup") >= 0) return "water";
  if (suit.indexOf("sword") >= 0) return "air";
  if (suit.indexOf("pentacle") >= 0 || suit.indexOf("coin") >= 0) return "earth";
  // 大牌：用牌名對照內建表的元素，否則靈
  const fb = TAROT_FALLBACK.find((x) => x.name === c.name);
  return fb ? fb.element : "aether";
}

async function generateAIFortune() {
  const t = ST.tarot;
  if (!t || t.aiTried) return;
  t.aiTried = true;
  // Puter.js 沒載入或不可用 → 直接用模板，不動作
  if (typeof puter === "undefined" || !puter.ai || !puter.ai.chat) return;
  t.aiLoading = true; render();
  const p = t.perfume;
  const pos = t.reversed ? "逆位" : "正位";
  const meaning = t.reversed ? (t.card.reversed || t.card.upright) : t.card.upright;
  const perfumeDesc = p ? (p.nameZh + "（" + (p.brand || "") + "），香調有" + allNotesOf(p)) : "（暫無對應香水）";
  const prompt = "你是一位溫柔而有洞察力的塔羅占卜師，正在為一位香水愛好者做今日單張牌占卜。\n" +
    "抽到的牌：" + t.card.nameZh + "（" + pos + "）\n" +
    "牌義關鍵字：" + meaning + "\n" +
    "為他挑選的今日香水：" + perfumeDesc + "\n\n" +
    "請用繁體中文，以塔羅師對來訪者說話的口吻，寫一段 80～120 字的今日運勢解讀。要自然、有溫度、像即興解牌，把牌的訊息和這款香水的氣味意象自然連結起來，給出今天的指引。只回傳那段話本身，不要任何前言、標題或引號。";
  try {
    const resp = await puter.ai.chat(prompt, { model: "gpt-5.4-nano", temperature: 0.9, max_tokens: 300 });
    let text = "";
    if (typeof resp === "string") text = resp;
    else if (resp && resp.message && resp.message.content) text = resp.message.content;
    else if (resp && resp.text) text = resp.text;
    text = String(text).trim();
    if (text && ST.tarot === t) {
      t.fortune = text;
      t.aiSource = true;
      // 更新今日存檔
      if (ST.tarotSaved && ST.tarotSaved.day === todayKey()) {
        ST.tarotSaved.fortune = text; ST.tarotSaved.aiSource = true;
        try { await store.put({ id: "tarot_today", _marker: true, value: ST.tarotSaved }); } catch (e) {}
      }
    }
  } catch (e) { /* AI 失敗 → 保留模板運勢 */ }
  t.aiLoading = false;
  render();
}
function syncFilterInputs() {
  const q = document.getElementById("search-text"); if (q) ST.searchText = q.value;

function toggleFilter(facet, key) {
  syncFilterInputs();
  const arr = ST.filters[facet];
  const i = arr.indexOf(key);
  if (i >= 0) arr.splice(i, 1); else arr.push(key);
  ST.filterResult = null;

}
function resetFilters() {
  ST.filters = { season: [], family: [], mood: [], occasion: [] };
  ST.wantText = ""; ST.avoidText = ""; ST.searchText = ""; ST.filterResult = null;
  render();
}
function runFilter() {
  const w = document.getElementById("want-text"); if (w) ST.wantText = w.value;
  const a = document.getElementById("avoid-text"); if (a) ST.avoidText = a.value;
  const q = document.getElementById("search-text"); if (q) ST.searchText = q.value;
  const wantList = parseNotes(ST.wantText);
  const avoidList = parseNotes(ST.avoidText);
  const search = ST.searchText.trim().toLowerCase();

  const activeFacets = [];
  ["season","family","mood","occasion"].forEach((f) => ST.filters[f].forEach((k) => activeFacets.push({ facet: f, key: k })));

  const scored = ST.collection.map((p) => {
    const all = allNotesOf(p);
    let score = 0; const reasons = []; let excluded = false;
    // 搜尋：中英文名、品牌、香調、描述任一命中（硬性條件）
    if (search) {
      const hay = ((p.nameZh||"") + " " + (p.name||"") + " " + (p.brand||"") + " " + all + " " + (p.description||"")).toLowerCase();
      if (hay.indexOf(search) < 0) excluded = true;
    }
    // 想避開的氣味
    if (!excluded) for (const av of avoidList) { if (av && all.indexOf(av) >= 0) { excluded = true; break; } }
    activeFacets.forEach(({ facet, key }) => {
      const opt = FACETS[facet].options.find((o) => o.key === key);
      if (!opt) return;
      const hit = opt.kw.filter((kw) => all.indexOf(kw) >= 0);
      if (hit.length) { score += hit.length; reasons.push(opt.label); }
    });
    wantList.forEach((wk) => { if (wk && all.indexOf(wk) >= 0) { score += 2; reasons.push(wk); } });
    return { perfume: p, score, reasons: [...new Set(reasons)], excluded };
  });

  const hasScoring = activeFacets.length > 0 || wantList.length > 0;
  const hasAnyCondition = hasScoring || !!search || avoidList.length > 0;
  let list = scored.filter((s) => !s.excluded);
  if (hasScoring) list = list.filter((s) => s.score > 0);
  list.sort((a, b) => b.score - a.score);
  list = list.slice(0, 6);
  ST.filterResult = { list, hasAnyCondition, avoidActive: avoidList.length > 0 };
  render();
}

    } else {
      const entry = Object.assign({ id: "p_" + Date.now(), savedAt: Date.now() }, base);
      await store.put(entry);
      ST.collection = [entry].concat(ST.collection);
    }
    ST.showForm = false; ST.form = emptyForm(); ST.editingId = null; render();
  } catch (e) { ST.formError = "儲存失敗，請再試一次。"; render(); }
}
async function removeItem(id) {
  try {
    await store.del(id);
    ST.collection = ST.collection.filter((x) => x.id !== id);
    ST.filterResult = null;
    render();
  } catch (e) {}
}

function pyramidHTML(notes, compact) {
  if (!notes) return "";
  if (!NOTE_TIERS.some((t) => (notes[t.key]||[]).length)) return "";
  const rows = NOTE_TIERS.map((tier) => {
    const list = notes[tier.key] || [];
    if (!list.length) return "";
    const pills = list.map((n) => '<span class="pill" style="background:' + tier.color + '18;border:1px solid ' + tier.color + '33;">' + esc(n) + '</span>').join("");
    return '<div class="tier-row"><div class="tier-head"><span class="tier-label" style="color:' + tier.color + '">' + tier.label + '</span><span class="tier-sub">' + tier.sub + '</span></div><div class="note-pills">' + pills + '</div></div>';
  }).join("");
  return '<div class="pyramid">' + rows + '</div>';
}

// ── 啟動 ──────────────────────────────────────────────
// 首次啟動時，自動把整個香水庫灌進收藏（只執行一次）
const SEED_MARKER = "seeded_v1";
async function seedIfFirstRun(rawItems) {
  const already = rawItems.some((x) => x.id === SEED_MARKER);
  if (already) return; // 已經灌過（或使用者已略過），不再動作
  // 用目前實際的收藏狀態判斷（前面的 migration 可能已補灌），避免重複灌入造成數量翻倍
  const userItems = ST.collection.filter((x) => !x._marker);
  if (userItems.length > 0) {
    // 收藏已有使用者資料 → 只補 marker，不灌、不覆蓋
    try { await store.put({ id: SEED_MARKER, savedAt: 0, _marker: true }); } catch (e) {}
    return;
  }
  // 收藏為空 → 灌入整個香水庫
  const now = Date.now();
  const seededItems = LIBRARY.map((p, i) => ({
    id: "seed_" + i,
    savedAt: now - i,
    name: p.name || p.nameZh,
    nameZh: p.nameZh || p.name,
    brand: p.brand,
    year: p.year,
    notes: { top: p.top || [], middle: p.middle || [], base: p.base || [] },
    description: p.description || "",
  }));
  for (const item of seededItems) {
    try { await store.put(item); } catch (e) {}
  }
  try { await store.put({ id: SEED_MARKER, savedAt: 0, _marker: true }); } catch (e) {}
  ST.collection = seededItems.sort((a, b) => b.savedAt - a.savedAt);
}

(async function init() {
  let raw = [];
  try { raw = await store.all(); } catch (e) { raw = []; }
  ST.collection = raw.filter((x) => !x._marker).sort((a,b)=>b.savedAt-a.savedAt);
  // 一次性遷移 v2：自動灌入的項目（seed_ 開頭）依英文名或中文名比對香水庫，全欄位同步最新查證資料
  if (!raw.some((x) => x.id === "libsync_v4")) {
    for (const item of ST.collection) {
      if (String(item.id).indexOf("seed_") !== 0) continue;
      const lib = LIBRARY.find((p) => (p.name && p.name === item.name) || (p.nameZh && p.nameZh === item.nameZh));
      if (lib) {
        item.name = lib.name || item.name;
        item.nameZh = lib.nameZh || item.nameZh;
        item.brand = lib.brand || item.brand;
        item.year = lib.year || "";
        item.notes = { top: lib.top || [], middle: lib.middle || [], base: lib.base || [] };
        item.description = lib.description || "";
        try { await store.put(item); } catch (e) {}
      }
    }
    try { await store.put({ id: "libsync_v4", savedAt: 0, _marker: true }); } catch (e) {}
  }
  const savedTheme = raw.find((x) => x.id === "pref_theme");
  if (savedTheme && savedTheme.value === "dark") ST.theme = "dark";
  applyTheme();
  // 一次性去重 + 補灌 v60：以中文名為唯一鍵（每款必有），修正空英文名造成的重複
  // v61：修正首次啟動時 dedup 補灌與 seedIfFirstRun 重複灌入導致收藏數量翻倍（例如 58 → 116），重跑一次去重清理
  if (!raw.some((x) => x.id === "dedup_v61")) {
    const keyOf = (o) => String((o.nameZh || o.name || "")).trim();
    // 同步 seeded 項目為香水庫最新資料
    for (const item of ST.collection) {
      if (String(item.id).indexOf("seed") !== 0) continue;
      const lib = LIBRARY.find((p) => keyOf(p) === keyOf(item) || (p.name && p.name === item.name));
      if (lib) {
        item.name = lib.name || ""; item.nameZh = lib.nameZh || item.nameZh;
        item.brand = lib.brand || item.brand; item.year = lib.year || "";
        item.notes = { top: lib.top || [], middle: lib.middle || [], base: lib.base || [] };
        item.description = lib.description || "";
      }
    }
    // 去重（手動項目優先保留）
    const seen = {};
    const ordered = ST.collection.slice().sort((a, b) => (String(a.id).indexOf("seed")===0?1:0) - (String(b.id).indexOf("seed")===0?1:0));
    const keep = [];
    for (const item of ordered) {
      const k = keyOf(item);
      if (!k || seen[k]) { continue; }
      seen[k] = true; keep.push(item);
    }
    const keepIds = new Set(keep.map((x) => x.id));
    for (const item of ST.collection) {
      if (!keepIds.has(item.id)) { try { await store.del(item.id); } catch (e) {} }
    }
    ST.collection = keep;
    // 補上缺的款
    const now = Date.now(); let ti = 0;
    for (const p of LIBRARY) {
      const k = keyOf(p);
      if (k && !seen[k]) {
        const item = { id: "seed_t60_" + (ti++), savedAt: now - ti, name: p.name || "", nameZh: p.nameZh || p.name, brand: p.brand, year: p.year, notes: { top: p.top || [], middle: p.middle || [], base: p.base || [] }, description: p.description || "" };
        try { await store.put(item); } catch (e) {}
        ST.collection.push(item); seen[k] = true;
      }
    }
    for (const item of ST.collection) { try { await store.put(item); } catch (e) {} }
    ST.collection.sort((a,b)=>b.savedAt-a.savedAt);
    try { await store.put({ id: "dedup_v61", savedAt: 0, _marker: true }); } catch (e) {}
  }
  // v62：舊版曾以「龍首」收錄 The World According to Arthur；統一為「龍」並移除重複項目
  if (!raw.some((x) => x.id === "dedup_v62")) {
    const arthurLib = LIBRARY.find((p) => p.name === "The World According to Arthur");
    const arthurItems = ST.collection.filter((item) =>
      item.name === "The World According to Arthur" || ["龍", "龍首"].includes(String(item.nameZh || "").trim())
    );
    if (arthurLib && arthurItems.length) {
      const keeper = arthurItems.slice().sort((a, b) => {
        const aSeed = String(a.id).startsWith("seed") ? 1 : 0;
        const bSeed = String(b.id).startsWith("seed") ? 1 : 0;
        return aSeed - bSeed || Number(b.savedAt || 0) - Number(a.savedAt || 0);
      })[0];
      keeper.name = arthurLib.name;
      keeper.nameZh = "龍";
      keeper.brand = arthurLib.brand;
      keeper.year = arthurLib.year;
      keeper.notes = { top: arthurLib.top || [], middle: arthurLib.middle || [], base: arthurLib.base || [] };
      keeper.description = arthurLib.description || "";
      try { await store.put(keeper); } catch (e) {}
      for (const item of arthurItems) {
        if (item.id !== keeper.id) { try { await store.del(item.id); } catch (e) {} }
      }
      const duplicateIds = new Set(arthurItems.filter((item) => item.id !== keeper.id).map((item) => item.id));
      ST.collection = ST.collection.filter((item) => !duplicateIds.has(item.id));
    }
    try { await store.put({ id: "dedup_v62", savedAt: 0, _marker: true }); } catch (e) {}
  }
  const savedTarot = raw.find((x) => x.id === "tarot_today");
  if (savedTarot && savedTarot.value) ST.tarotSaved = savedTarot.value;
  try { await seedIfFirstRun(raw); } catch (e) {}
  ST.loading = false;
  render();
})();
</script>
</body>
