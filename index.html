// ── 持久儲存：IndexedDB ──────────────────────────────
const DB_NAME = "perfume-cabinet", STORE = "perfumes";
function openDB() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open(DB_NAME, 1);
    req.onupgradeneeded = () => { const db = req.result; if (!db.objectStoreNames.contains(STORE)) db.createObjectStore(STORE, { keyPath: "id" }); };
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });
}
const store = {
  async all() { const db = await openDB(); return new Promise((res, rej) => { const t = db.transaction(STORE,"readonly").objectStore(STORE).getAll(); t.onsuccess=()=>res(t.result||[]); t.onerror=()=>rej(t.error); }); },
  async put(item) { const db = await openDB(); return new Promise((res, rej) => { const t = db.transaction(STORE,"readwrite").objectStore(STORE).put(item); t.onsuccess=()=>res(true); t.onerror=()=>rej(t.error); }); },
  async del(id) { const db = await openDB(); return new Promise((res, rej) => { const t = db.transaction(STORE,"readwrite").objectStore(STORE).delete(id); t.onsuccess=()=>res(true); t.onerror=()=>rej(t.error); }); },
};

// 取一款香水的全部香調字串
function allNotesOf(p) {
  return [].concat(p.notes && p.notes.top || [], p.notes && p.notes.middle || [], p.notes && p.notes.base || []).join(" ");
}
function toggleFilter(facet, key) {
  const arr = ST.filters[facet];
  const i = arr.indexOf(key);
  if (i >= 0) arr.splice(i, 1); else arr.push(key);
  ST.filterResult = null;
  render();
}
function resetFilters() {
  ST.filters = { season: [], family: [], mood: [], occasion: [] };
  ST.wantText = ""; ST.avoidText = ""; ST.filterResult = null;
  render();
}
function runFilter() {
  const w = document.getElementById("want-text"); if (w) ST.wantText = w.value;
  const a = document.getElementById("avoid-text"); if (a) ST.avoidText = a.value;
  const wantList = parseNotes(ST.wantText);
  const avoidList = parseNotes(ST.avoidText);

  const activeFacets = [];
  ["season","family","mood","occasion"].forEach((f) => ST.filters[f].forEach((k) => activeFacets.push({ facet: f, key: k })));

  const scored = ST.collection.map((p) => {
    const all = allNotesOf(p);
    let score = 0; const reasons = []; let excluded = false;
    for (const av of avoidList) { if (av && all.indexOf(av) >= 0) { excluded = true; break; } }
    activeFacets.forEach(({ facet, key }) => {
      const opt = FACETS[facet].options.find((o) => o.key === key);
      if (!opt) return;
      const hit = opt.kw.filter((kw) => all.indexOf(kw) >= 0);
      if (hit.length) { score += hit.length; reasons.push(opt.label); }
    });
    wantList.forEach((wk) => { if (wk && all.indexOf(wk) >= 0) { score += 2; reasons.push(wk); } });
    return { perfume: p, score, reasons: [...new Set(reasons)], excluded };
  });

  const hasAnyCondition = activeFacets.length > 0 || wantList.length > 0;
  let list = scored.filter((s) => !s.excluded);
  if (hasAnyCondition) list = list.filter((s) => s.score > 0);
  list.sort((a, b) => b.score - a.score);
  list = list.slice(0, 6);
  ST.filterResult = { list, hasAnyCondition, avoidActive: avoidList.length > 0 };
  render();
}

function openEditForm(item) {
  ST.form = {
    name: item.name||"", nameZh: item.nameZh||"", brand: item.brand||"", year: item.year||"",
    top: ((item.notes&&item.notes.top)||[]).join("、"), middle: ((item.notes&&item.notes.middle)||[]).join("、"), base: ((item.notes&&item.notes.base)||[]).join("、"),
    description: item.description||"", longevity: item.longevity ? String(item.longevity) : "2",
  };
  ST.editingId = item.id; ST.formError = null; ST.showForm = true; render();
}
function fillFromLibrary(idx) {
  if (idx === "") return;
  const p = LIBRARY[Number(idx)];
  ST.form = {
    name: p.name||"", nameZh: p.nameZh||"", brand: p.brand||"", year: p.year||"",
    top: (p.top||[]).join("、"), middle: (p.middle||[]).join("、"), base: (p.base||[]).join("、"),
    description: p.description||"", longevity: p.longevity ? String(p.longevity) : "2",
  };
  ST.formError = null; render();
}
function syncFormFromInputs() {
  ["name","nameZh","brand","year","top","middle","base","description","longevity"].forEach((k) => {
    const el = document.getElementById("f-" + k);
    if (el) ST.form[k] = el.value;
  });
}
async function saveForm() {
  syncFormFromInputs();
  const f = ST.form;
  if (!f.name.trim() && !f.nameZh.trim()) { ST.formError = "請至少填入香水名稱（中文或原文皆可）。"; render(); return; }
  const notes = { top: parseNotes(f.top), middle: parseNotes(f.middle), base: parseNotes(f.base) };
  const base = {
    name: f.name.trim() || f.nameZh.trim(), nameZh: f.nameZh.trim() || f.name.trim(),
    brand: f.brand.trim(), year: f.year.trim(), notes: notes, description: f.description.trim(),
    longevity: Number(f.longevity) || 2,
  };
  try {
    if (ST.editingId) {
      const existing = ST.collection.find((c) => c.id === ST.editingId) || {};
      const updated = Object.assign({}, existing, base);
      await store.put(updated);
      ST.collection = ST.collection.map((x) => x.id === ST.editingId ? updated : x);
    } else {
      const entry = Object.assign({ id: "p_" + Date.now(), savedAt: Date.now() }, base);
      await store.put(entry);
      ST.collection = [entry].concat(ST.collection);
    }
    ST.showForm = false; ST.form = emptyForm(); ST.editingId = null; render();
  } catch (e) { ST.formError = "儲存失敗，請再試一次。"; render(); }
}
async function removeItem(id) {
  try {
    await store.del(id);
    ST.collection = ST.collection.filter((x) => x.id !== id);
    ST.filterResult = null;
    render();
  } catch (e) {}
}

// ── 畫面 ──────────────────────────────────────────────
function pyramidHTML(notes, compact) {
  if (!notes) return "";
  if (!NOTE_TIERS.some((t) => (notes[t.key]||[]).length)) return "";
  const rows = NOTE_TIERS.map((tier) => {
    const list = notes[tier.key] || [];
    if (!list.length) return "";
    const pills = list.map((n) => '<span class="pill" style="background:' + tier.color + '18;border:1px solid ' + tier.color + '33;">' + esc(n) + '</span>').join("");
    return '<div class="tier-row"><div class="tier-head"><span class="tier-label" style="color:' + tier.color + '">' + tier.label + '</span><span class="tier-sub">' + tier.sub + '</span></div><div class="note-pills">' + pills + '</div></div>';
  }).join("");
  return '<div class="pyramid">' + rows + '</div>';
}

function render() {
  let listHTML;
  if (ST.loading) listHTML = '<div class="empty">' + IC.spinner(20) + '</div>';
  else if (!ST.collection.length) listHTML = '<div class="empty">收藏室還是空的。點上方「新增香水」開始建立。</div>';
  else listHTML = '<div class="grid">' + ST.collection.map((item) => {
    const badge = item.longevity ? '<span class="long-badge">持香 ' + LONG_LABELS[item.longevity] + '</span>' : "";
    const desc = item.description ? '<p class="c-desc">' + esc(item.description) + '</p>' : "";
    return '<div class="card"><div class="card-actions"><button class="icon-btn" data-edit="' + item.id + '">' + IC.pencil() + '</button><button class="icon-btn danger" data-del="' + item.id + '">' + IC.trash() + '</button></div>' +
      '<div class="card-img">' + IC.droplet(24) + '</div>' +
      '<div class="c-brand">' + esc(item.brand || "—") + (item.year ? ' · ' + esc(item.year) : '') + '</div>' +
      '<div class="c-name">' + esc(item.nameZh) + '</div><div class="c-orig">' + esc(item.name) + '</div>' + desc + badge + pyramidHTML(item.notes, true) + '</div>';
  }).join("") + '</div>';

  let modalHTML = "";
  if (ST.showForm) {
    const f = ST.form;
    const errHTML = ST.formError ? '<div class="f-err">' + esc(ST.formError) + '</div>' : "";
    modalHTML = '<div class="overlay" id="overlay"><div class="modal" id="modal"><button class="close" id="close-modal">' + IC.x() + '</button>' +
      '<div class="modal-title">' + (ST.editingId ? '編輯香水' : '新增香水') + '</div>' +
      '<div class="f-row"><div class="field"><div class="f-label">中文名稱</div><input class="input" id="f-nameZh" value="' + esc(f.nameZh) + '" placeholder="例如：檀香 33"></div><div class="field"><div class="f-label">原文名稱</div><input class="input" id="f-name" value="' + esc(f.name) + '" placeholder="Santal 33"></div></div>' +
      '<div class="f-row"><div class="field"><div class="f-label">品牌</div><input class="input" id="f-brand" value="' + esc(f.brand) + '" placeholder="Le Labo"></div><div class="field"><div class="f-label">年份</div><input class="input" id="f-year" value="' + esc(f.year) + '" placeholder="2011"></div></div>' +
      '<div class="field"><div class="f-label">前調（用、或逗號分隔）</div><input class="input" id="f-top" value="' + esc(f.top) + '" placeholder="小豆蔻、紫羅蘭"></div>' +
      '<div class="field"><div class="f-label">中調</div><input class="input" id="f-middle" value="' + esc(f.middle) + '" placeholder="鳶尾、皮革"></div>' +
      '<div class="field"><div class="f-label">後調</div><input class="input" id="f-base" value="' + esc(f.base) + '" placeholder="檀香、雪松、麝香"></div>' +
      '<div class="field"><div class="f-label">描述（選填）</div><input class="input" id="f-description" value="' + esc(f.description) + '" placeholder="一句話形容它的氣味性格"></div>' +
      '<div class="field"><div class="f-label">持香度</div><select class="input" id="f-longevity"><option value="1"' + (f.longevity==="1"?' selected':'') + '>清淡（約 2–4 小時，貼膚淡香）</option><option value="2"' + (f.longevity==="2"?' selected':'') + '>適中（約 4–6 小時）</option><option value="3"' + (f.longevity==="3"?' selected':'') + '>持久（6 小時以上，擴散明顯）</option></select></div>' +
      errHTML + '<button class="save-btn" id="save-form">' + (ST.editingId ? '儲存修改' : '加入收藏') + '</button></div></div>';
  }

  // ── 篩選面板（主功能，常駐顯示） ──
  function facetChips(facetKey) {
    return FACETS[facetKey].options.map((o) => {
      const on = ST.filters[facetKey].indexOf(o.key) >= 0;
      return '<button class="fchip' + (on ? ' on' : '') + '" data-facet="' + facetKey + '" data-fkey="' + o.key + '">' + o.label + '</button>';
    }).join("");
  }
  let resultHTML = "";
  if (ST.filterResult) {
    const fr = ST.filterResult;
    if (!fr.hasAnyCondition && !fr.avoidActive) {
      resultHTML = '<div class="hint">選擇上面的條件，再按「推薦給我」。</div>';
    } else if (fr.list.length === 0) {
      resultHTML = '<div class="hint">收藏裡沒有符合這些條件的香水。放寬條件試試。</div>';
    } else {
      const rows = fr.list.map((r, i) => {
        const p = r.perfume;
        const badge = p.longevity ? '<span class="long-badge">持香 ' + LONG_LABELS[p.longevity] + '</span>' : "";
        const why = r.reasons.length ? '<div class="rec-hits">符合：' + r.reasons.map((m) => '<span class="hit-pill">' + esc(m) + '</span>').join("") + '</div>' : "";
        const orig = p.name && p.name !== p.nameZh ? '<span class="rl-orig">' + esc(p.name) + '</span>' : "";
        return '<div class="rec-row"><div class="rl-rank">' + (i + 1) + '</div><div class="rl-body"><div class="rl-title">' + esc(p.nameZh) + ' ' + orig + '</div><div class="rl-brand">' + esc(p.brand || "—") + '</div>' + why + '</div><div class="rl-side">' + badge + '</div></div>';
      }).join("");
      resultHTML = '<div class="rec-list"><div class="rec-head"><span class="rec-tag">' + IC.sparkles() + ' 為你推薦</span><span class="rec-count">' + fr.list.length + ' 款</span></div>' + rows + '</div>';
    }
  }
  const filterBody =
    '<div class="filter-sect"><div class="f-sect-title">' + FACETS.season.title + '</div><div class="fchip-row">' + facetChips("season") + '</div></div>' +
    '<div class="filter-sect"><div class="f-sect-title">' + FACETS.family.title + '</div><div class="fchip-row">' + facetChips("family") + '</div></div>' +
    '<div class="filter-sect"><div class="f-sect-title">' + FACETS.mood.title + '</div><div class="fchip-row">' + facetChips("mood") + '</div></div>' +
    '<div class="filter-sect"><div class="f-sect-title">' + FACETS.occasion.title + '</div><div class="fchip-row">' + facetChips("occasion") + '</div></div>' +
    '<div class="filter-sect"><div class="f-sect-title">想要的氣味（可選，用、分隔）</div><input class="input" id="want-text" value="' + esc(ST.wantText) + '" placeholder="例如：玫瑰、檀香"></div>' +
    '<div class="filter-sect"><div class="f-sect-title">想避開的氣味（可選）</div><input class="input" id="avoid-text" value="' + esc(ST.avoidText) + '" placeholder="例如：廣藿香、菸草"></div>' +
    '<div class="filter-btns"><button class="save-btn" id="run-filter" style="flex:1">推薦給我</button><button class="reset-btn" id="reset-filter">清除</button></div>' +
    resultHTML;
  const filterPanel =
    '<div class="narrow panel"><div class="w-title">今天該擦哪一瓶？</div><div class="w-sub">選擇季節、香調、心情、場合等條件，按「推薦給我」，從收藏中挑出最適合的 6 款。（心情與場合由香調自動判斷，僅供參考）</div>' + filterBody + '</div>';

  document.getElementById("app").innerHTML =
    '<header class="narrow" style="margin-bottom:24px"><div style="display:flex;align-items:center;gap:7px;margin-bottom:6px">' + IC.droplet(18,"#C9A85C",1.5) + '<span class="kicker">香水收藏室</span></div><h1 class="title">The Perfume Cabinet</h1><p class="subtitle">記錄你的香水，依季節、香調、心情挑出最適合的幾款。</p></header>' +
    '<div class="narrow"><button class="btn-add" id="add-btn">' + IC.plus(17) + ' 新增香水</button></div>' +
    filterPanel +
    '<div class="wide col-head" id="col-toggle"><span class="col-title">我的收藏</span><span class="count">' + ST.collection.length + '</span><span class="col-arrow">' + (ST.collectionCollapsed ? '展開 ▼' : '收起 ▲') + '</span></div>' +
    (ST.collectionCollapsed ? '' : '<div class="wide">' + listHTML + '</div>') + modalHTML;

  bind();
}

function bind() {
  const add = document.getElementById("add-btn"); if (add) add.onclick = openAddForm;
  const ct = document.getElementById("col-toggle"); if (ct) ct.onclick = () => { ST.collectionCollapsed = !ST.collectionCollapsed; render(); };
  document.querySelectorAll("[data-facet]").forEach((b) => b.onclick = () => toggleFilter(b.getAttribute("data-facet"), b.getAttribute("data-fkey")));
  const rf = document.getElementById("run-filter"); if (rf) rf.onclick = runFilter;
  const rsf = document.getElementById("reset-filter"); if (rsf) rsf.onclick = resetFilters;
  document.querySelectorAll("[data-edit]").forEach((b) => b.onclick = () => { const it = ST.collection.find((c)=>c.id===b.getAttribute("data-edit")); if (it) openEditForm(it); });
  document.querySelectorAll("[data-del]").forEach((b) => b.onclick = () => removeItem(b.getAttribute("data-del")));
  const close = document.getElementById("close-modal"); if (close) close.onclick = () => { ST.showForm = false; render(); };
  const ov = document.getElementById("overlay"); if (ov) ov.onclick = (e) => { if (e.target === ov) { syncFormFromInputs(); ST.showForm = false; render(); } };
  const save = document.getElementById("save-form"); if (save) save.onclick = saveForm;
}

// ── 啟動 ──────────────────────────────────────────────
// 首次啟動時，自動把整個香水庫灌進收藏（只執行一次）
const SEED_MARKER = "seeded_v1";
async function seedIfFirstRun(rawItems) {
  const already = rawItems.some((x) => x.id === SEED_MARKER);
  if (already) return; // 已經灌過（或使用者已略過），不再動作
  const userItems = rawItems.filter((x) => !x._marker);
  if (userItems.length > 0) {
    // 收藏已有使用者資料 → 只補 marker，不灌、不覆蓋
    try { await store.put({ id: SEED_MARKER, savedAt: 0, _marker: true }); } catch (e) {}
    return;
  }
  // 收藏為空 → 灌入整個香水庫
  const now = Date.now();
  const seededItems = LIBRARY.map((p, i) => ({
    id: "seed_" + i,
    savedAt: now - i,
    name: p.name || p.nameZh,
    nameZh: p.nameZh || p.name,
    brand: p.brand,
    year: p.year,
    notes: { top: p.top || [], middle: p.middle || [], base: p.base || [] },
    description: p.description || "",
    longevity: p.longevity || 2,
  }));
  for (const item of seededItems) {
    try { await store.put(item); } catch (e) {}
  }
  try { await store.put({ id: SEED_MARKER, savedAt: 0, _marker: true }); } catch (e) {}
  ST.collection = seededItems.sort((a, b) => b.savedAt - a.savedAt);
}

(async function init() {
  let raw = [];
  try { raw = await store.all(); } catch (e) { raw = []; }
  ST.collection = raw.filter((x) => !x._marker).sort((a,b)=>b.savedAt-a.savedAt);
  try { await seedIfFirstRun(raw); } catch (e) {}
  ST.loading = false;
  render();
})();
</script>
</body>
