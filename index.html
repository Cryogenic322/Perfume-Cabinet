// ── 持久儲存：IndexedDB ──────────────────────────────
const DB_NAME = "perfume-cabinet", STORE = "perfumes";
function openDB() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open(DB_NAME, 1);
    req.onupgradeneeded = () => { const db = req.result; if (!db.objectStoreNames.contains(STORE)) db.createObjectStore(STORE, { keyPath: "id" }); };
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });
}
const store = {
  async all() { const db = await openDB(); return new Promise((res, rej) => { const t = db.transaction(STORE,"readonly").objectStore(STORE).getAll(); t.onsuccess=()=>res(t.result||[]); t.onerror=()=>rej(t.error); }); },
  async put(item) { const db = await openDB(); return new Promise((res, rej) => { const t = db.transaction(STORE,"readwrite").objectStore(STORE).put(item); t.onsuccess=()=>res(true); t.onerror=()=>rej(t.error); }); },
  async del(id) { const db = await openDB(); return new Promise((res, rej) => { const t = db.transaction(STORE,"readwrite").objectStore(STORE).delete(id); t.onsuccess=()=>res(true); t.onerror=()=>rej(t.error); }); },
};

function tierForTemp(t) {
  return TEMP_TIERS.find((x) => t > x.min && t <= x.max) || TEMP_TIERS.find((x) => t <= x.max) || TEMP_TIERS[TEMP_TIERS.length-1];
}

function recommend(key, wx) {
  ST.tierKey = key; ST.recommendation = null; ST.recList = [];
  if (ST.collection.length) {
    const pref = WEATHER_PREFS[key];
    const scored = ST.collection.map((p) => {
      const all = [].concat(p.notes && p.notes.top || [], p.notes && p.notes.middle || [], p.notes && p.notes.base || []).join(" ");
      let noteScore = 0; const matched = [];
      pref.like.forEach((kw) => { if (all.indexOf(kw) >= 0) { noteScore++; matched.push(kw); } });
      const lon = p.longevity || 0;
      const longScore = lon ? Math.max(0, 2 - Math.abs(lon - pref.prefLong)) : 0;
      return { perfume: p, score: noteScore + longScore, noteScore, matched, lon };
    });
    // 只列有命中香調的，依適合度（總分）由高到低；同分時持香度貼合者在前
    ST.recList = scored
      .filter((s) => s.noteScore > 0)
      .sort((a, b) => b.score - a.score);
  }
  render();
}

function fetchWeather() {
  if (!navigator.geolocation) { ST.wxState = "error"; render(); return; }
  ST.wxState = "loading"; render();
  navigator.geolocation.getCurrentPosition(
    async (pos) => {
      const { latitude, longitude } = pos.coords;
      try {
        const r = await fetch("https://api.open-meteo.com/v1/forecast?latitude=" + latitude + "&longitude=" + longitude + "&current=temperature_2m&timezone=auto");
        const d = await r.json();
        const temp = Math.round(d.current.temperature_2m);
        let place = "你所在的位置";
        try {
          const g = await fetch("https://api.bigdatacloud.net/data/reverse-geocode-client?latitude=" + latitude + "&longitude=" + longitude + "&localityLanguage=zh");
          const j = await g.json();
          place = j.city || j.locality || j.principalSubdivision || place;
        } catch (e) {}
        ST.autoWx = { temp: temp, place: place };
        ST.wxState = "done";
        recommend(tierForTemp(temp).key, ST.autoWx);
      } catch (e) { ST.wxState = "error"; render(); }
    },
    () => { ST.wxState = "error"; render(); },
    { enableHighAccuracy: false, timeout: 10000 }
  );
}

async function saveForm() {
  syncFormFromInputs();
  const f = ST.form;
  if (!f.name.trim() && !f.nameZh.trim()) { ST.formError = "請至少填入香水名稱（中文或原文皆可）。"; render(); return; }
  const notes = { top: parseNotes(f.top), middle: parseNotes(f.middle), base: parseNotes(f.base) };
  const base = {
    name: f.name.trim() || f.nameZh.trim(), nameZh: f.nameZh.trim() || f.name.trim(),
    brand: f.brand.trim(), year: f.year.trim(), notes: notes, description: f.description.trim(),
    longevity: Number(f.longevity) || 2,
  };
  try {
    if (ST.editingId) {
      const existing = ST.collection.find((c) => c.id === ST.editingId) || {};
      const updated = Object.assign({}, existing, base);
      await store.put(updated);
      ST.collection = ST.collection.map((x) => x.id === ST.editingId ? updated : x);
    } else {
      const entry = Object.assign({ id: "p_" + Date.now(), savedAt: Date.now() }, base);
      await store.put(entry);
      ST.collection = [entry].concat(ST.collection);
    }
    ST.showForm = false; ST.form = emptyForm(); ST.editingId = null; render();
  } catch (e) { ST.formError = "儲存失敗，請再試一次。"; render(); }
}
async function removeItem(id) {
  try {
    await store.del(id);
    ST.collection = ST.collection.filter((x) => x.id !== id);
    ST.recList = ST.recList.filter((r) => r.perfume.id !== id);
    render();
  } catch (e) {}
}

function pyramidHTML(notes, compact) {
  if (!notes) return "";
  if (!NOTE_TIERS.some((t) => (notes[t.key]||[]).length)) return "";
  const rows = NOTE_TIERS.map((tier) => {
    const list = notes[tier.key] || [];
    if (!list.length) return "";
    const pills = list.map((n) => '<span class="pill" style="background:' + tier.color + '18;border:1px solid ' + tier.color + '33;">' + esc(n) + '</span>').join("");
    return '<div class="tier-row"><div class="tier-head"><span class="tier-label" style="color:' + tier.color + '">' + tier.label + '</span><span class="tier-sub">' + tier.sub + '</span></div><div class="note-pills">' + pills + '</div></div>';
  }).join("");
  return '<div class="pyramid">' + rows + '</div>';
}

  else listHTML = '<div class="grid">' + ST.collection.map((item) => {
    const badge = item.longevity ? '<span class="long-badge">持香 ' + LONG_LABELS[item.longevity] + '</span>' : "";
    const desc = item.description ? '<p class="c-desc">' + esc(item.description) + '</p>' : "";
    return '<div class="card"><div class="card-actions"><button class="icon-btn" data-edit="' + item.id + '">' + IC.pencil() + '</button><button class="icon-btn danger" data-del="' + item.id + '">' + IC.trash() + '</button></div>' +
      '<div class="card-img">' + IC.droplet(24) + '</div>' +
      '<div class="c-brand">' + esc(item.brand || "—") + (item.year ? ' · ' + esc(item.year) : '') + '</div>' +
      '<div class="c-name">' + esc(item.nameZh) + '</div><div class="c-orig">' + esc(item.name) + '</div>' + desc + badge + pyramidHTML(item.notes, true) + '</div>';
  }).join("") + '</div>';

  let modalHTML = "";
  if (ST.showForm) {
    const f = ST.form;
    const libOpts = LIBRARY.map((p, i) => '<option value="' + i + '">' + esc(p.brand) + '　' + esc(p.nameZh) + (p.verified ? '' : '（待補香調）') + '</option>').join("");
    const libSel = !ST.editingId ? '<div style="margin-bottom:18px"><div class="f-label">從香水庫快速帶入（選填）</div><select class="input" id="lib-select"><option value="">— 手動輸入，或從這裡選一款 —</option>' + libOpts + '</select></div>' : "";
    const errHTML = ST.formError ? '<div class="f-err">' + esc(ST.formError) + '</div>' : "";
    modalHTML = '<div class="overlay" id="overlay"><div class="modal" id="modal"><button class="close" id="close-modal">' + IC.x() + '</button>' +
      '<div class="modal-title">' + (ST.editingId ? '編輯香水' : '新增香水') + '</div>' + libSel +
      '<div class="f-row"><div class="field"><div class="f-label">中文名稱</div><input class="input" id="f-nameZh" value="' + esc(f.nameZh) + '" placeholder="例如：檀香 33"></div><div class="field"><div class="f-label">原文名稱</div><input class="input" id="f-name" value="' + esc(f.name) + '" placeholder="Santal 33"></div></div>' +
      '<div class="f-row"><div class="field"><div class="f-label">品牌</div><input class="input" id="f-brand" value="' + esc(f.brand) + '" placeholder="Le Labo"></div><div class="field"><div class="f-label">年份</div><input class="input" id="f-year" value="' + esc(f.year) + '" placeholder="2011"></div></div>' +
      '<div class="field"><div class="f-label">前調（用、或逗號分隔）</div><input class="input" id="f-top" value="' + esc(f.top) + '" placeholder="小豆蔻、紫羅蘭"></div>' +
      '<div class="field"><div class="f-label">中調</div><input class="input" id="f-middle" value="' + esc(f.middle) + '" placeholder="鳶尾、皮革"></div>' +
      '<div class="field"><div class="f-label">後調</div><input class="input" id="f-base" value="' + esc(f.base) + '" placeholder="檀香、雪松、麝香"></div>' +
      '<div class="field"><div class="f-label">描述（選填）</div><input class="input" id="f-description" value="' + esc(f.description) + '" placeholder="一句話形容它的氣味性格"></div>' +
      '<div class="field"><div class="f-label">持香度</div><select class="input" id="f-longevity"><option value="1"' + (f.longevity==="1"?' selected':'') + '>清淡（約 2–4 小時，貼膚淡香）</option><option value="2"' + (f.longevity==="2"?' selected':'') + '>適中（約 4–6 小時）</option><option value="3"' + (f.longevity==="3"?' selected':'') + '>持久（6 小時以上，擴散明顯）</option></select></div>' +
      errHTML + '<button class="save-btn" id="save-form">' + (ST.editingId ? '儲存修改' : '加入收藏') + '</button></div></div>';
  }

  document.getElementById("app").innerHTML =
    '<header class="narrow" style="margin-bottom:24px"><div style="display:flex;align-items:center;gap:7px;margin-bottom:6px">' + IC.droplet(18,"#C08A3E",1.5) + '<span class="kicker">香水收藏室</span></div><h1 class="title">The Perfume Cabinet</h1><p class="subtitle">手動記錄你的香水，依今天的天氣從收藏中挑一款來擦。</p></header>' +
    '<div class="narrow"><button class="btn-add" id="add-btn">' + IC.plus(17) + ' 新增香水</button></div>' +
    '<div class="narrow panel"><div class="w-title">今天該擦哪一瓶？</div><div class="w-sub">' + wxSubText + '</div>' + autoRow + loadingRow + errRow + '<div class="w-grid">' + chips + '</div>' + recHTML + '</div>' +
    '<div class="wide col-head"><span class="col-title">我的收藏</span><span class="count">' + ST.collection.length + '</span></div>' +
    '<div class="wide">' + listHTML + '</div>' + modalHTML;

  bind();
}

function bind() {
  const add = document.getElementById("add-btn"); if (add) add.onclick = openAddForm;
  const retry = document.getElementById("retry-wx"); if (retry) retry.onclick = fetchWeather;
  const autoBtn = document.getElementById("auto-wx"); if (autoBtn) autoBtn.onclick = fetchWeather;
  document.querySelectorAll("[data-tier]").forEach((b) => b.onclick = () => recommend(b.getAttribute("data-tier"), ST.autoWx));
  document.querySelectorAll("[data-edit]").forEach((b) => b.onclick = () => { const it = ST.collection.find((c)=>c.id===b.getAttribute("data-edit")); if (it) openEditForm(it); });
  document.querySelectorAll("[data-del]").forEach((b) => b.onclick = () => removeItem(b.getAttribute("data-del")));
  const lib = document.getElementById("lib-select"); if (lib) lib.onchange = () => fillFromLibrary(lib.value);
  const close = document.getElementById("close-modal"); if (close) close.onclick = () => { ST.showForm = false; render(); };
  const ov = document.getElementById("overlay"); if (ov) ov.onclick = (e) => { if (e.target === ov) { syncFormFromInputs(); ST.showForm = false; render(); } };
  const save = document.getElementById("save-form"); if (save) save.onclick = saveForm;
}

// ── 啟動 ──────────────────────────────────────────────
(async function init() {
  try { const items = await store.all(); ST.collection = items.sort((a,b)=>b.savedAt-a.savedAt); }
  catch (e) { ST.collection = []; }
  ST.loading = false;
  render();
})();
</script>
</body>
</html>
